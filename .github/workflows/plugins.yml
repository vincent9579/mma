name: Plugins

on:
  push:
    branches: [master]
    paths: ['plugins/**']
  pull_request:
    paths: ['plugins/**']

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node plugins/build-all.mjs
      # Fail if the committed build artifacts (index.js, registry.json) are stale.
      - run: git diff --exit-code -- plugins/

  sidecar-version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sha="${{ github.event.pull_request.base.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            sha="${{ github.event.before }}"
          else
            sha="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Check sidecar version bumps
        run: |
          base="${{ steps.base.outputs.sha }}"
          echo "Comparing against base: $base"
          fail=0

          for cargo in plugins/*/sidecar/Cargo.toml; do
            [ -f "$cargo" ] || continue
            sidecar_dir="$(dirname "$cargo")"
            plugin_dir="$(dirname "$sidecar_dir")"
            src_dir="$sidecar_dir/src"

            changed=$(git diff --name-only "$base" HEAD -- "$src_dir" "$cargo" || true)
            if [ -z "$changed" ]; then
              continue
            fi

            head_version=$(grep -m1 '^version' "$cargo" | sed -E 's/version *= *"([^"]+)"/\1/')
            base_version=$(git show "$base:$cargo" 2>/dev/null | grep -m1 '^version' | sed -E 's/version *= *"([^"]+)"/\1/' || echo "")

            if [ "$head_version" = "$base_version" ]; then
              echo "::error file=$cargo::sidecar source/deps changed under $sidecar_dir but Cargo.toml version ($head_version) was not bumped"
              fail=1
            fi

            manifest="$plugin_dir/manifest.json"
            if [ -f "$manifest" ]; then
              manifest_version=$(node -pe "(require('./$manifest').sidecar || {}).version || ''")
              if [ -n "$manifest_version" ] && [ "$manifest_version" != "$head_version" ]; then
                echo "::error file=$manifest::manifest.json sidecar.version ($manifest_version) does not match Cargo.toml version ($head_version)"
                fail=1
              fi
            fi
          done

          exit $fail
