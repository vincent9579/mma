name: Update manual on release

# When a GitHub Release is published, have Claude treat the in-app manual
# (app/src/components/dialogs/Manual.add.tsx) as a living document: fold the
# release's user-facing changes into the right chapters and open a DRAFT PR.
# release.yml creates a *draft* release; this fires when you publish it.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to document (e.g. v0.5.2)'
        required: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-manual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update manual
        uses: anthropics/claude-code-action@v1
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: '{"attribution":{"commit":"","pr":""}}'
          claude_args: |
            --model claude-opus-4-6[1m]
            --dangerously-skip-permissions
          prompt: |
            A new release of this app was just published. The release tag is in the
            env var $RELEASE_TAG. Your job: update the user manual to reflect what
            this release changed for users, then open a DRAFT pull request.

            THE MANUAL
            - It is the in-app dialog at app/src/components/dialogs/Manual.add.tsx,
              a React component whose content is the `CHAPTERS` array. Each chapter
              is JSX built from primitives: <Kbd>, <Note>, <Img>, <ChapterLink id=.../>.
            - Treat it as a LIVING DOCUMENT, not a changelog. Integrate changes into
              the chapters where they naturally belong -- edit existing prose so it
              describes how the app works *now*. Add a new chapter only if a feature
              is substantial enough to warrant one. Never add a "What's new" / release
              notes / changelog section.
            - Match the existing tone, structure, and primitives exactly. Read several
              existing chapters first so your edits are indistinguishable from them.
            - Use <ChapterLink id="..."/> for cross-references so they don't drift.

            WHAT TO DOCUMENT
            - Read the release notes:  gh release view "$RELEASE_TAG" --json body -q .body
            - Find the previous release tag and diff against it to see what changed,
              e.g.:  PREV=$(git tag --sort=-v:refname | grep -A1 -x "$RELEASE_TAG" | tail -1)
                     git log --oneline "$PREV".."$RELEASE_TAG"
                     git diff "$PREV".."$RELEASE_TAG" -- app/src
            - Only document USER-FACING changes (new features, changed behavior,
              new keybinds/settings/dialogs). Ignore refactors, performance work,
              tests, build/CI, and internal-only changes.
            - If nothing in this release is user-facing, do NOT open a PR. Instead
              finish without making changes and say so.

            IMAGES (important)
            - You CANNOT take screenshots. When a change needs a new visual, add an
              <Img name="descriptive-name.png" caption="..."/> placeholder referencing
              an image that does not exist yet (images live at repo-root img/manual/
              and are fetched at runtime; a missing one hides itself, so a placeholder
              is safe). Do NOT create image files.
            - Do NOT hand-edit generated files (manual-img-dims.gen.ts, *.gen.ts).
            - In the PR body, list every placeholder image you added so the maintainer
              can add the screenshot to img/manual/ and run `cd app && npm run gen:image-dims`.

            THE PULL REQUEST
            - Open a DRAFT PR on a new branch, titled: docs: update manual for $RELEASE_TAG
            - PR body: a short summary of which chapters you changed and why, followed
              by a "Screenshots needed" checklist of the placeholder image names (omit
              the section if there are none).
            - Keep everything concise.
