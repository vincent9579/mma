name: Copyright Plugin Release

on:
  push:
    tags: ['copyright-v*']
  workflow_dispatch:

jobs:
  # Export ONNX model + character dict (once, platform-independent).
  # Deps are pinned and export_models.py verifies model/dict class agreement,
  # so a toolchain drift fails the release instead of shipping a broken bundle.
  export-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install paddlepaddle==3.3.1 paddleocr==3.7.0 paddle2onnx==2.1.0 onnx==1.17.0
      - name: Export ONNX model
        working-directory: plugins/copyright/sidecar
        run: python export_models.py --output-dir models
      - uses: actions/upload-artifact@v4
        with:
          name: ocr-models
          path: plugins/copyright/sidecar/models/
          if-no-files-found: error

  # Build sidecar binary for each platform (GPU backend where available)
  build-sidecar:
    uses: ./.github/workflows/build-sidecar.yml
    with:
      crate-path: plugins/copyright/sidecar
      binary-name: mma-copyright
      features-windows-x64: directml
      features-macos-arm64: coreml

  # Bundle everything into release archives
  package:
    needs: [export-models, build-sidecar]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: windows-x64
            suffix: .exe
          - label: macos-arm64
            suffix: ''
          - label: linux-x64
            suffix: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mma-copyright-${{ matrix.label }}
          path: bundle/

      - uses: actions/download-artifact@v4
        with:
          name: ocr-models
          path: bundle/models/

      - name: Create archive
        run: |
          cd bundle
          chmod +x mma-copyright${{ matrix.suffix }} 2>/dev/null || true
          zip -r ../mma-copyright-${{ matrix.label }}.zip .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: mma-copyright-bundle-${{ matrix.label }}
          path: mma-copyright-${{ matrix.label }}.zip

  # Single fan-in job attaches all archives: parallel per-platform attaches race
  # to create the release for the tag (duplicate drafts, stranded assets).
  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mma-copyright-bundle-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          # never steal the Latest badge from app releases (updater reads releases/latest)
          make_latest: false
          files: mma-copyright-*.zip
