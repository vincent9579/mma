name: Copyright Plugin Release

on:
  push:
    tags: ['copyright-v*']
  workflow_dispatch:

jobs:
  # Export ONNX model + character dict (once, platform-independent)
  export-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install paddlepaddle paddleocr paddle2onnx onnx
      - name: Export ONNX model
        working-directory: plugins/copyright/sidecar
        run: python export_models.py --output-dir models
      - uses: actions/upload-artifact@v4
        with:
          name: ocr-models
          path: plugins/copyright/sidecar/models/
          if-no-files-found: error

  # Build sidecar binary for each platform (GPU backend where available)
  build-sidecar:
    uses: ./.github/workflows/build-sidecar.yml
    with:
      crate-path: plugins/copyright/sidecar
      binary-name: mma-copyright
      features-windows-x64: directml
      features-macos-arm64: coreml

  # Bundle everything into release archives
  package:
    needs: [export-models, build-sidecar]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - label: windows-x64
            suffix: .exe
          - label: macos-arm64
            suffix: ''
          - label: linux-x64
            suffix: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mma-copyright-${{ matrix.label }}
          path: bundle/

      - uses: actions/download-artifact@v4
        with:
          name: ocr-models
          path: bundle/models/

      - name: Create archive
        run: |
          cd bundle
          chmod +x mma-copyright${{ matrix.suffix }} 2>/dev/null || true
          zip -r ../mma-copyright-${{ matrix.label }}.zip .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: mma-copyright-bundle-${{ matrix.label }}
          path: mma-copyright-${{ matrix.label }}.zip

      # Attach to GitHub release if triggered by tag
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # never steal the Latest badge from app releases (updater reads releases/latest)
          make_latest: false
          files: mma-copyright-${{ matrix.label }}.zip
