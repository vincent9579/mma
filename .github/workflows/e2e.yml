name: E2E Tests

# Runs the full Docker e2e suite (mocked Street View) exactly once per release tag,
# recording a per-release baseline: when something breaks later, `gh run list
# --workflow e2e` answers "was this green at vX.Y.Z?" without rebuilding old tags.
# Not a release gate — the release workflow does not wait on this.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build e2e image
        run: bash scripts/e2e-build.sh

      - name: Run e2e suite (mocked SV)
        run: bash scripts/e2e.sh --mock

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ github.ref_name }}
          path: |
            app/test/logs/
            build-e2e.log
          if-no-files-found: ignore
